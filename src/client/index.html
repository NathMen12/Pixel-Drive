<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PixelDrive - Stockage cloud Zero-Knowledge chiffré côté client">
  <meta name="theme-color" content="#0f0f1a">
  <title>PixelDrive</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              300: '#a5b4fc',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              800: '#3730a3',
              900: '#312e81',
            },
            surface: {
              DEFAULT: '#111827',
              lighter: '#1f2937',
              darker: '#0f0f1a',
            },
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'slide-in': 'slideIn 0.3s ease-out',
            'scale-in': 'scaleIn 0.15s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateY(-10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
          },
        },
      },
    };
  </script>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PixelDrive">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://api.imgbb.com" crossorigin>
</head>
<body class="bg-surface-darker text-white min-h-screen">
  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none" aria-live="polite" aria-atomic="true"></div>

  <!-- App Root -->
  <div id="app" class="min-h-screen flex flex-col">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-surface-darker z-50 flex items-center justify-center transition-opacity duration-300">
      <div class="text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-primary-600 rounded-2xl mb-6">
          <svg width="40" height="40" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"></circle>
            <circle cx="15.5" cy="8.5" r="1.5" fill="currentColor"></circle>
            <circle cx="8.5" cy="15.5" r="1.5" fill="currentColor"></circle>
            <circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"></circle>
          </svg>
        </div>
        <h1 class="text-2xl font-bold mb-2">PixelDrive</h1>
        <p class="text-gray-400">Chargement de votre espace...</p>
        <div class="mt-6 w-48 mx-auto">
          <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-primary-500 rounded-full animate-pulse" style="width: 100%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Layout (hidden until loaded) -->
    <div id="main-layout" class="hidden flex flex-col min-h-screen">
      <!-- Header -->
      <pd-header></pd-header>

      <!-- Body -->
      <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="hidden lg:block w-72 flex-shrink-0" id="sidebar">
          <pd-sidebar></pd-sidebar>
        </aside>

        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" aria-hidden="true"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-hidden" id="main-content">
          <!-- Router outlet - views rendered here -->
        </main>
      </div>
    </div>

    <!-- Global Modals Container -->
    <div id="modal-portal"></div>

    <!-- Upload Queue (global) -->
    <pd-upload-queue></pd-upload-queue>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

  <!-- Main Entry Point -->
  <script type="module" src="/assets/main.js"></script>
</body>
</html>
